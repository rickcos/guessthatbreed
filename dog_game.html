<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess Daisy's Breed Mix!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 600px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
        }

        .name-section {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px dashed #ecf0f1;
        }

        .name-section label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #2c3e50;
        }

        .form-headers {
            display: flex;
            font-weight: bold;
            margin-bottom: 10px;
            color: #7f8c8d;
            padding-right: 40px;
        }

        .col-breed { flex: 2; margin-right: 15px; }
        .col-percent { flex: 1; }

        .breed-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input[type="text"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccd1d9;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        input[type="text"]:focus, select:focus {
            border-color: #3498db;
            outline: none;
        }

        .btn-delete {
            background: none;
            border: none;
            color: #e74c3c;
            font-size: 20px;
            cursor: pointer;
            margin-left: 10px;
            padding: 5px;
        }

        .btn-delete:hover { color: #c0392b; }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px solid #ecf0f1;
        }

        button.btn-main {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button.btn-main:hover { background-color: #2980b9; }
        button.btn-submit { background-color: #2ecc71; }
        button.btn-submit:hover { background-color: #27ae60; }

        button:disabled {
            background-color: #bdc3c7 !important;
            cursor: not-allowed;
        }

        .status-container { text-align: right; }
        .total-display { font-size: 18px; font-weight: bold; }
        .status-valid { color: #2ecc71; }
        .status-invalid { color: #e74c3c; }
        .status-pending { color: #f39c12; }
    </style>
</head>
<body>

<div class="game-container">
    <h1>Guess Daisy's Breed Mix! 🐶</h1>
    
    <form id="guess-form" onsubmit="event.preventDefault(); handleGuessSubmit();">
        
        <div class="name-section">
            <label for="player-name">Your Name</label>
            <input type="text" id="player-name" placeholder="Enter your name..." required>
        </div>

        <div class="form-headers">
            <div class="col-breed">Breed Name</div>
            <div class="col-percent">Percentage</div>
        </div>

        <div id="breed-rows-container">
            <!-- Dynamic rows land here -->
        </div>

        <div class="actions">
            <button type="button" class="btn-main" id="add-breed-btn">Add Breed</button>
            <div class="status-container">
                <div id="total-percentage-text" class="total-display status-pending">Total: 0%</div>
            </div>
        </div>

        <button type="submit" class="btn-main btn-submit" id="submit-btn" style="width: 100%; margin-top: 20px;" disabled>
            Submit Guess & View Results
        </button>
    </form>
</div>

<script>
    const container = document.getElementById('breed-rows-container');
    const addBtn = document.getElementById('add-breed-btn');
    const submitBtn = document.getElementById('submit-btn');
    const totalText = document.getElementById('total-percentage-text');

    function generatePercentOptions() {
        let optionsHtml = '<option value="0">0%</option>';
        for (let i = 5; i <= 100; i += 5) {
            optionsHtml += `<option value="${i}">${i}%</option>`;
        }
        return optionsHtml;
    }

    function createRow() {
        const row = document.createElement('div');
        row.className = 'breed-row';
        row.innerHTML = `
            <div class="col-breed"><input type="text" placeholder="e.g., Golden Retriever" required></div>
            <div class="col-percent"><select class="percent-dropdown">${generatePercentOptions()}</select></div>
            <button type="button" class="btn-delete" title="Remove breed">×</button>
        `;
        row.querySelector('.percent-dropdown').addEventListener('change', calculateTotal);
        row.querySelector('.btn-delete').addEventListener('click', () => { row.remove(); calculateTotal(); });
        container.appendChild(row);
        calculateTotal();
    }

    function calculateTotal() {
        const dropdowns = document.querySelectorAll('.percent-dropdown');
        let total = 0;
        dropdowns.forEach(dropdown => total += parseInt(dropdown.value) || 0);
        totalText.innerText = `Total: ${total}%`;
        totalText.className = 'total-display';

        if (total === 100) {
            totalText.classList.add('status-valid');
            submitBtn.disabled = false;
        } else {
            totalText.classList.add(total > 100 ? 'status-invalid' : 'status-pending');
            submitBtn.disabled = true;
        }
    }

    function handleGuessSubmit() {
        const name = document.getElementById('player-name').value.trim();
        const rows = document.querySelectorAll('.breed-row');
        const breedMix = [];

        rows.forEach(row => {
            const breed = row.querySelector('input[type="text"]').value.trim();
            const percent = row.querySelector('.percent-dropdown').value;
            if(breed) {
                breedMix.push(`${percent}% ${breed}`);
            }
        });

        // 1. Retrieve existing guesses from localStorage
        const allGuesses = JSON.parse(localStorage.getItem('daisy_guesses')) || [];
        
        // 2. Add the new guess
        allGuesses.push({ name, mix: breedMix.join(', ') });
        
        // 3. Save back to localStorage
        localStorage.setItem('daisy_guesses', JSON.stringify(allGuesses));

        // 4. Trigger the results popup BEFORE resetting the main form view
        openGuessesPopup(allGuesses);

        // 5. Reset the form clean for the next player
        document.getElementById('player-name').value = '';
        container.innerHTML = '';
        createRow();
        createRow();
    }

    function openGuessesPopup(allGuesses) {
        const popup = window.open("", "DaisyGuesses", "width=600,height=600,scrollbars=yes");
        
        if (!popup) {
            alert("Your guess was saved, but the results popup was blocked! Please allow popups for this page to view everyone's guesses.");
            return;
        }

        let tableRows = '';
        allGuesses.forEach(g => {
            tableRows += `<tr>
                <td style="padding:12px; border-bottom:1px solid #eee; font-weight:bold; color:#2c3e50;">${g.name}</td>
                <td style="padding:12px; border-bottom:1px solid #eee; color:#555;">${g.mix}</td>
            </tr>`;
        });

        popup.document.write(`
            <html>
            <head>
                <title>Daisy's Breed Mix - All Guesses</title>
                <style>
                    body { font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; background-color: #f9fbfb; color: #333; }
                    h2 { color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
                    table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
                    th { background-color: #3498db; color: white; padding: 12px; text-align: left; }
                </style>
            </head>
            <body>
                <h2>All Guesses for Daisy 🐾</h2>
                <table>
                    <thead>
                        <tr>
                            <th style="width: 30%;">Name</th>
                            <th style="width: 70%;">Guessed Mix</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${tableRows}
                    </tbody>
                </table>
            </body>
            </html>
        `);
        popup.document.close();
    }

    // Initialize
    addBtn.addEventListener('click', createRow);
    createRow();
    createRow();
</script>

</body>
</html>
