<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess Daisy's Breed Mix!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 600px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        /* STYLING FOR DAISY'S PHOTO */
        .dog-image-container {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }

        .dog-image {
            width: 100%;
            max-width: 400px; /* Limits size on desktop */
            height: auto;
            border-radius: 12px; /* Gives nice rounded corners */
            box-shadow: 0 6px 18px rgba(0,0,0,0.1); /* Adds a soft drop shadow */
        }

        .name-section {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px dashed #ecf0f1;
        }

        .name-section label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #2c3e50;
        }

        .form-headers {
            display: flex;
            font-weight: bold;
            margin-bottom: 10px;
            color: #7f8c8d;
            padding-right: 40px;
        }

        .col-breed { flex: 2; margin-right: 15px; }
        .col-percent { flex: 1; }

        .breed-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input[type="text"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccd1d9;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        input[type="text"]:focus, select:focus {
            border-color: #3498db;
            outline: none;
        }

        .btn-delete {
            background: none;
            border: none;
            color: #e74c3c;
            font-size: 20px;
            cursor: pointer;
            margin-left: 10px;
            padding: 5px;
        }

        .btn-delete:hover { color: #c0392b; }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px solid #ecf0f1;
        }

        button.btn-main {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button.btn-main:hover { background-color: #2980b9; }
        button.btn-submit { background-color: #2ecc71; }
        button.btn-submit:hover { background-color: #27ae60; }

        button:disabled {
            background-color: #bdc3c7 !important;
            cursor: not-allowed;
        }

        .status-container { text-align: right; }
        .total-display { font-size: 18px; font-weight: bold; }
        .status-valid { color: #2ecc71; }
        .status-invalid { color: #e74c3c; }
        .status-pending { color: #f39c12; }
    </style>
</head>
<body>

<div class="game-container">
    <h1>Guess Daisy's Breed Mix! 🐶</h1>
    
    <div class="dog-image-container">
        <img src="daisy.jpg" alt="Daisy the dog" class="dog-image">
    </div>

    <form id="guess-form">
        
        <div class="name-section">
            <label for="player-name">Your Name</label>
            <input type="text" id="player-name" placeholder="Enter your name..." required>
        </div>

        <div class="form-headers">
            <div class="col-breed">Breed Name</div>
            <div class="col-percent">Percentage</div>
        </div>

        <div id="breed-rows-container">
            </div>

        <div class="actions">
            <button type="button" class="btn-main" id="add-breed-btn">Add Breed</button>
            <div class="status-container">
                <div id="total-percentage-text" class="total-display status-pending">Total: 0%</div>
            </div>
        </div>

        <button type="submit" class="btn-main btn-submit" id="submit-btn" style="width: 100%; margin-top: 20px;" disabled>
            Submit Guess & See Results
        </button>
    </form>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js';
    import { initializeFirestore, collection, addDoc } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js';

    const firebaseConfig = {
        apiKey: "AIzaSyCceXtmtPa3jTRFCiMSyL5dqDbymPcUk6k",
        authDomain: "daisy-guessing-game.firebaseapp.com",
        projectId: "daisy-guessing-game",
        storageBucket: "daisy-guessing-game.firebasestorage.app",
        messagingSenderId: "184137201955",
        appId: "1:184137201955:web:f2a632b55540ac25aab496"
    };

    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, {
        experimentalForceLongPolling: true
    });

    const container = document.getElementById('breed-rows-container');
    const addBtn = document.getElementById('add-breed-btn');
    const submitBtn = document.getElementById('submit-btn');
    const totalText = document.getElementById('total-percentage-text');
    const guessForm = document.getElementById('guess-form');

    function generatePercentOptions() {
        let optionsHtml = '<option value="0">0%</option>';
        for (let i = 5; i <= 100; i += 5) {
            optionsHtml += `<option value="${i}">${i}%</option>`;
        }
        return optionsHtml;
    }

    function createRow() {
        const row = document.createElement('div');
        row.className = 'breed-row';
        row.innerHTML = `
            <div class="col-breed"><input type="text" name="dog-breed" placeholder="e.g., Golden Retriever" required></div>
            <div class="col-percent"><select name="dog-percentage" class="percent-dropdown">${generatePercentOptions()}</select></div>
            <button type="button" class="btn-delete" title="Remove breed">×</button>
        `;
        row.querySelector('.percent-dropdown').addEventListener('change', calculateTotal);
        row.querySelector('.btn-delete').addEventListener('click', () => { row.remove(); calculateTotal(); });
        container.appendChild(row);
        calculateTotal();
    }

    function calculateTotal() {
        const dropdowns = document.querySelectorAll('.percent-dropdown');
        let total = 0;
        dropdowns.forEach(dropdown => total += parseInt(dropdown.value) || 0);
        totalText.innerText = `Total: ${total}%`;
        totalText.className = 'total-display';

        if (total === 100) {
            totalText.classList.add('status-valid');
            submitBtn.disabled = false;
        } else {
            totalText.classList.add(total > 100 ? 'status-invalid' : 'status-pending');
            submitBtn.disabled = true;
        }
    }

    async function handleGuessSubmit(event) {
        event.preventDefault();
        
        submitBtn.disabled = true;
        submitBtn.innerText = "Sending to Cloud...";

        const name = document.getElementById('player-name').value.trim();
        const rows = document.querySelectorAll('.breed-row');
        const breedMix = [];

        rows.forEach(row => {
            const breed = row.querySelector('input[type="text"]').value.trim();
            const percent = row.querySelector('.percent-dropdown').value;
            if(breed) {
                breedMix.push(`${percent}% ${breed}`);
            }
        });

        try {
            await addDoc(collection(db, "guesses"), {
                name: name,
                mix: breedMix.join(', '),
                timestamp: new Date()
            });

            window.location.href = 'results.html';
        } catch (error) {
            console.error("Error saving guess: ", error);
            alert("Oops! Something went wrong saving your guess.");
            submitBtn.disabled = false;
            submitBtn.innerText = "Submit Guess & See Results";
        }
    }

    addBtn.addEventListener('click', createRow);
    guessForm.addEventListener('submit', handleGuessSubmit);
    
    createRow();
    createRow();
</script>

</body>
</html>
